<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Smart Agriculture IoT Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

h1{
margin:20px;
}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
font-size:18px;
}

.value{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.chartbox{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

.graph-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin:20px;
}

.small-chart{
background:white;
padding:20px;
border-radius:10px;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:8px;
border:1px solid #ddd;
}

button{
padding:10px 20px;
font-size:16px;
margin:20px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Smart Agriculture IoT Dashboard</h1>

<div class="container">

<div class="card">Soil Moisture<div id="soil" class="value">--</div></div>
<div class="card">Rain<div id="rain" class="value">--</div></div>
<div class="card">TDS<div id="tds" class="value">--</div></div>

<div class="card">Temperature<div id="temp" class="value">--</div></div>
<div class="card">Humidity<div id="hum" class="value">--</div></div>
<div class="card">AQI<div id="aqi" class="value">--</div></div>

<div class="card">CO<div id="co" class="value">--</div></div>
<div class="card">CH4<div id="ch4" class="value">--</div></div>
<div class="card">NH3<div id="nh3" class="value">--</div></div>

<div class="card">H2S<div id="h2s" class="value">--</div></div>

</div>

<h2 id="pump">Pump Status: --</h2>

<div class="graph-grid">

<div class="small-chart">
<canvas id="soilChart"></canvas>
</div>

<div class="small-chart">
<canvas id="tdsChart"></canvas>
</div>

<div class="small-chart">
<canvas id="aqiChart"></canvas>
</div>

<div class="small-chart">
<canvas id="tempChart"></canvas>
</div>

</div>

<div class="chartbox"><canvas id="coChart"></canvas></div>
<div class="chartbox"><canvas id="ch4Chart"></canvas></div>
<div class="chartbox"><canvas id="nh3Chart"></canvas></div>
<div class="chartbox"><canvas id="h2sChart"></canvas></div>

<h2>Data History</h2>

<button onclick="downloadCSV()">Download CSV</button>

<table id="history">
<tr>
<th>Time</th>
<th>Temp</th>
<th>Humidity</th>
<th>CO</th>
<th>CH4</th>
<th>NH3</th>
<th>H2S</th>
</tr>
</table>

<script>

const token="vhhYU3opW5SUIO69qAFlGJXwkc25MgEw"

let labels=[]

let coData=[]
let ch4Data=[]
let nh3Data=[]
let h2sData=[]

let soilData=[]
let tdsData=[]
let aqiData=[]
let tempData=[]

let history=[]

function createChart(id,label,color){

return new Chart(document.getElementById(id),{
type:"line",
data:{
labels:labels,
datasets:[{
label:label,
data:[],
borderColor:color,
backgroundColor:color,
tension:0.4,
fill:false
}]
},
options:{
responsive:true,
plugins:{legend:{display:true}},
scales:{
x:{ticks:{color:"black"}},
y:{ticks:{color:"black"}}
}
}
})

}

const coChart=createChart("coChart","CO","red")
const ch4Chart=createChart("ch4Chart","CH4","blue")
const nh3Chart=createChart("nh3Chart","NH3","green")
const h2sChart=createChart("h2sChart","H2S","purple")

const soilChart=createChart("soilChart","Soil Moisture","orange")
const tdsChart=createChart("tdsChart","TDS","brown")
const aqiChart=createChart("aqiChart","AQI","black")
const tempChart=createChart("tempChart","Temperature","red")

async function fetchData(){

let res=await fetch(`https://blynk.cloud/external/api/getAll?token=${token}`)
let data=await res.json()

let soil=data.v7||0
let rain=data.v8||0
let tds=data.v10||0
let temp=data.v0||0
let hum=data.v1||0
let aqi=data.v6||0

let co=data.v2||0
let ch4=data.v3||0
let nh3=data.v4||0
let h2s=data.v5||0

let pump=data.v9||0

document.getElementById("soil").innerText=soil
document.getElementById("tds").innerText=tds
document.getElementById("temp").innerText=temp+" °C"
document.getElementById("hum").innerText=hum+" %"
document.getElementById("aqi").innerText=aqi

document.getElementById("co").innerText=co
document.getElementById("ch4").innerText=ch4
document.getElementById("nh3").innerText=nh3
document.getElementById("h2s").innerText=h2s

document.getElementById("rain").innerText=rain==1?"YES":"NO"

document.getElementById("pump").innerHTML=
pump==1?"Pump Status: <span style='color:lime'>ON</span>":
"Pump Status: <span style='color:red'>OFF</span>"

let time=new Date().toLocaleTimeString()

labels.push(time)

coData.push(co)
ch4Data.push(ch4)
nh3Data.push(nh3)
h2sData.push(h2s)

soilData.push(soil)
tdsData.push(tds)
aqiData.push(aqi)
tempData.push(temp)

if(labels.length>20){
labels.shift()
coData.shift()
ch4Data.shift()
nh3Data.shift()
h2sData.shift()

soilData.shift()
tdsData.shift()
aqiData.shift()
tempData.shift()
}

coChart.data.labels=labels
ch4Chart.data.labels=labels
nh3Chart.data.labels=labels
h2sChart.data.labels=labels

soilChart.data.labels=labels
tdsChart.data.labels=labels
aqiChart.data.labels=labels
tempChart.data.labels=labels

coChart.data.datasets[0].data=coData
ch4Chart.data.datasets[0].data=ch4Data
nh3Chart.data.datasets[0].data=nh3Data
h2sChart.data.datasets[0].data=h2sData

soilChart.data.datasets[0].data=soilData
tdsChart.data.datasets[0].data=tdsData
aqiChart.data.datasets[0].data=aqiData
tempChart.data.datasets[0].data=tempData

coChart.update()
ch4Chart.update()
nh3Chart.update()
h2sChart.update()

soilChart.update()
tdsChart.update()
aqiChart.update()
tempChart.update()

let row=[time,temp,hum,co,ch4,nh3,h2s]
history.push(row)

let table=document.getElementById("history")
let tr=document.createElement("tr")

row.forEach(v=>{
let td=document.createElement("td")
td.innerText=v
tr.appendChild(td)
})

table.appendChild(tr)

}

function downloadCSV(){

let csv="Time,Temp,Humidity,CO,CH4,NH3,H2S\n"

history.forEach(r=>{
csv+=r.join(",")+"\n"
})

let blob=new Blob([csv],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="sensor_data.csv"
a.click()

}

setInterval(fetchData,2000)

</script>

</body>
</html>
